<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-store">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <meta name="format-detection" content="telephone=no">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <meta name="_csrf" th:content="${_csrf.token}">

    <title th:text="${title}"></title>

    <link th:href="@{/public/css/reset.css}" rel="stylesheet">
    <link th:href="@{/public/css/ibooks.css}" rel="stylesheet">
    <link th:href="@{/public/css/utility.css}" rel="stylesheet">
    <link th:href="@{/public/css/style.css}" rel="stylesheet">

    <link th:href="@{/public/img/favicon.ico}" rel="icon" type="image/x-icon">

    <script th:src="@{/public/js/bootstrap.min.js}"></script>
    <script th:src="@{/public/js/jquery.min.js}"></script>
    <script>
        $(function() {
            $('form').bind('submit', function(e) {
                $('#loading').show();
                return true;
            });
        });
    </script>
</head>
<body>
    <div th:fragment="footer" th:remove="tag">
        <div id="loading">
            <div class="loading-area">
                <p>処理中</p>
                <div class="spinner-area">
                    <div class="three-quarter-spinner"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
