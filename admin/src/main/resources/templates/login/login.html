<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" th:with="title='ログイン'">
<head th:replace="~{_common/login::head}"></head>
<body>
    <div class="login-container ">
        <!-- ロゴ -->
        <div class="u-text-center">
            <img th:src="@{/public/img/app_title_icon.png}" alt="ibooks">
        </div>

        <div class="u-d-flex u-justify-content-center u-align-items-center">
        
            <div class="login-area u-text-center">
                <!-- タイトル -->
                <h1 class="login-title u-mb24">ログイン</h1>

                <!-- エラー -->
                <div class="login-error u-mb16" th:if="${loginError != null}">
                    ログインIDまたはパスワードが正しくありません
                </div>

                <!-- フォーム -->
                <form th:action="@{/login/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="form-group u-mb16">
                        <label for="inputLoginId">ログインID</label>
                        <input type="text" name="loginId" class="login-input u-w100" id="inputLoginId" required>
                    </div>

                    <div class="form-group u-mb32">
                        <label for="inputPassword">パスワード</label>
                        <input type="password" name="password" class="login-input u-w100" id="inputPassword" required>
                    </div>

                    <div class="u-mb16">
                        <button type="submit" class="login-btn u-w100">ログイン</button>
                    </div>

                    <div class="u-text-end">
                        <a th:href="@{/forgot-password}" class="forgot-link">
                            パスワードを忘れましたか？
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{_common/login::footer}"></div>
</body>
</html>
