<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <title th:text="${title}"></title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-store">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <meta name="_csrf" th:content="${_csrf.token}">

    <link th:href="@{/public/css/reset.css}">
    <link th:href="@{/public/css/style.css}">
    <link th:href="@{/public/img/icon/favicon.ico}" rel="icon" type="image/x-icon">

<!--    <script th:src="@{/public/js/jquery-3.7.1.min.js}"></script>-->
<!--    <script th:src="@{/public/js/bootstrap.min.js}"></script>-->
    <script>
        $(function() {
            $('form').bind('submit', function(e) {
                $('#loading').show();
                return true;
            });
        });
    </script>

</head>
<body>
    <div th:fragment="footer" th:remove="tag">
        <div id="loading">
          <div class="loading-content">
              <p>処理中</p>
              <div class="spinner-area">
                  <div class="three-quarter-spinner"></div>
              </div>
          </div>
        </div>
    </div>
</body>
</html>
