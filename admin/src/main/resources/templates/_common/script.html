<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="head">
    <meta charset="UTF-8" />
  </head>

  <body>
    <script th:fragment="csrfHeader">
      $(function () {
        var headerName = $("meta[name='_csrf_header']").attr("content");
        var tokenValue = $("meta[name='_csrf']").attr("content");
        $(document).ajaxSend(function (e, xhr, options) {
          xhr.setRequestHeader(headerName, tokenValue);
        });
      });

      function setCsrfHeaders(headers) {
        if (headers == null) {
          return;
        }
        headers[$("meta[name='_csrf_header']").attr("content")] =
          $("meta[name='_csrf']").attr("content");
      }
    </script>

    <script th:fragment="uploadFileName">
      $(function () {
        $('input[type="file"]').change(function () {
          var input = $(this),
            numFiles = input.get(0).files ? input.get(0).files.length : 1,
            label = input.val().replace(/\\/g, "/").replace(/.*\//, "");
          if (label.length > 60) {
            label = label.substring(0, 60) + "...";
          }
          input.parent().next("p").text(label);
        });
      });
    </script>

    <script th:fragment="uploadCsvFile">
      $(function () {
        $('input[type="file"]').change(function () {
          var input = $(this),
            numFiles = input.get(0).files ? input.get(0).files.length : 1,
            label = input.val().replace(/\\/g, "/").replace(/.*\//, "");
          if (label.length > 60) {
            label = label.substring(0, 60) + "...";
          }
          input.parent().next("p").text(label);
        });

        $("#upload").click(function () {
          confirmUpload();
        });

        $("#message .close").click(function () {
          $("#message").hide();
        });

        $("#errorMessage .close").click(function () {
          $("#errorMessage").hide();
        });

        async function confirmUpload() {
          if (confirm("アップロードします。よろしいでしょうか？")) {
            ibooks.showProgress();
            hideMessages();
            let $form = $("#mainForm");
            let formData = new FormData($form[0]);
            const headers = {};
            setCsrfHeaders(headers);
            const resp = await fetch($form.attr("action"), {
              method: "POST",
              cache: "no-cache",
              headers: headers,
              body: formData,
            });

            if (!resp.ok) {
              ibooks.hideProgress();
              showErrorMessage("アップロードに失敗しました。");
            }

            const reader = resp.body
              ?.pipeThrough(new TextDecoderStream())
              .getReader();
            if (!reader) {
              ibooks.hideProgress();
              showErrorMessage("アップロードに失敗しました。");
              return;
            }

            let result = "";
            let message = "";
            let errorMessages = null;
            let data = "";
            while (true) {
              const { value, done } = await reader.read();
              if (done) {
                break;
              }
              if (!value) {
                continue;
              }
              try {
                let arr = value.split("\n");
                for (let res of arr) {
                  res = res.trim();
                  // if (res.match(/^data:.*/)) {
                  //   res = res.trim();
                  // }
                  res = res.replace(/^data:\s*/, "");
                  if (res === "") {
                    continue;
                  }
                  data += res;
                  if (!data.match(/.*}$/)) {
                    continue;
                  }
                  const json = JSON.parse(data);
                  if (json.result != null) {
                    result = json.result;
                    message = json.message;
                    if (json.errorMessages) {
                      errorMessages = json.errorMessages;
                    }
                  } else if (json.allCount != null) {
                    var allCount = Number(json.allCount);
                    var count = Number(json.count);
                    ibooks.updateProgress(allCount, count);
                  }
                  data = "";
                }
              } catch (error) {
                console.error(error);
                result = "ERROR";
                message = "アップロードに失敗しました。";
              }
            }
						ibooks.hideProgress();
            if (result === "ERROR") {
              showErrorMessage(message);
              if (errorMessages) {
                showErrorMessages(errorMessages);
              }
              return;
            }
            showSuccessMessage(message);
                if (errorMessages) {
                    showErrorMessages(errorMessages);
                }
          }
        }
        function resetForm() {
            $('#mainForm').find('input[name="reset"]').click();
            $('#csvFile').parent().next('p').text('');
        }

        function hideMessages() {
            $('#message').hide();
            $('#errorMessage').hide();
            $('#errorMessages').hide();
        }

        function showErrorMessages(errorMessages) {
            $('#errorMessages').find('.messages > tr').remove();
            for (var error of errorMessages) {
                var tr = $('<tr>');
                var td = $('<td>');
                    tr.append(td);
                    $('#errorMessages').find('.message').append(tr);
            }
            $('#errorMessages').show();
        }

        function showErrorMessage(message) {
            resetForm();
            $('#errorMessage').find('li').remove();
            var li = $('<li>').text(message);
                $('#errorMessage').find('ul').append(li);
                $('#errorMessage').show();
        }

        function showSuccessMessage(message) {
            resetForm();
            $('#message').find('li').remove();
            var li = $('<li>').text(message);
                $('#message').find('ul').append(li);
                $('#message').show();
        }
      });
    </script>

		<div th:fragment="asyncDownloadCsvFile" th:remove="tag">
			<form id="async-download-form" action="/" method="post" class="ignoreLock">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf_token}">
				<input type="hidden" name="key" value="">
			</form>
			<script>
				$(function() {
					$('.async-csv-download').click(function() {
						const createFileUrl = $(this).attr('data-create-file-url');
						const downloadUrl = $(this).attr('data-download-url');
						const $form = $(this).closest('form');
						csvDownload($form, createFileUrl, downloadUrl);
					});

					async function csvDownload($form, createFileUrl, downloadUrl) {
						ibooks.showProgress();
						let formData = new FormData($form[0]);
						const headers = {};
						setCsrfHeaders(headers);
						const resp = await fetch(createFileUrl, {
							method: 'POST',
							cache: 'no-cache',
							headers: headers,
							body: formData
						});
						if (!resp.ok) {
							ibooks.hideProgress();
							alert("ダウンロードに失敗しました。");
							return;
						}
						const reader = resp.body?.pipeThrough(new TextDecoderStream()).getReader();
						if (!reader) {
							ibooks.hideProgress();
							alert("ダウンロードに失敗しました。");
							return;
						}
						let result = 'ERROR';
						let key = '';
						while (true) {
							const {value, done} = await reader.read();
							if (done) {
								break;
							}
							if (!value) {
								continue;
							}
							try {
								let arr = value.split('\n');
								for (let res of arr) {
									res = res.trim();
									if (res.match(/^data:.*/)) {
										res = res.substring(5);
									}
									if (res === '') {
										continue;
									}
									const json = JSON.parse(res);
									if (json.result != null) {
										result = json.result;
										if (json.key != null) {
											key = json.key;
										}
									} else if (json.allCount != null) {
										var allCount = Number(json.allCount);
										var count = Number(json.count);
										ibooks.updateProgress(allCount, count);
									}
								}
							} catch (error) {
								result = 'ERROR';
							}
						}
						ibooks.hideProgress();
						if (result === 'ERROR') {
							alert('ダウンロードに失敗しました。');
							return;
						}
						const $dlForm = $('#async-download-form');
						$dlForm.attr('action', downloadUrl);
						$dlForm.find('input[name="key"]'.val(key));
						$dlForm.submit();
					}
				});
			</script>
		</div>
  </body>
</html>
