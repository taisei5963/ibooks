<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" th:with="title='カテゴリCSVアップロード'">
<head th:replace="~{_common/head::head}"></head>
<body class="content-body ds-book-upload-index">
<div th:replace="~{_common/header::menu}"></div>

<main class="container u-py24">

    <h1 class="u-mb24 u-ms24 u-fs-2">カテゴリCSVアップロード</h1>

    <div class="search-cond u-mb16">
        <div th:replace="~{_common/upload::messages}"></div>
    </div>

    <section class="upload-card">
        <form id="mainForm"
            th:action="@{/categoryUpload/upload}"
            enctype="multipart/form-data"
            method="post">

            <div class="upload-form-area">
                <div th:replace="~{_common/upload::upload(accept='.csv')}"></div>
            </div>
        </form>
    </section>
    <div class="upload-guide-area">
        <a th:href="@{/sample/category.csv}"
            download="category.csv"
            class="sample-download-link ignoreLock">
            サンプルCSVをダウンロード
        </a>
    </div>

    <div class="upload-error-area">
        <div th:replace="~{_common/upload::errors}"></div>
    </div>

</main>
<script th:replace="~{_common/script::csrfHeader}"></script>
<script th:replace="~{_common/script::uploadCsvFile}"></script>
<div th:replace="~{_common/script::asyncDownloadCsvFile}"></div>
<div th:replace="~{_common/footer::footer}"></div>
</body>
</html>
