<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" th:with="title='ブック一覧'">
<head th:replace="~{_common/head::head}"></head>
<body>
<div th:replace="~{_common/header::menu}"></div>

<h1>ブック一覧</h1>
<div class="search-cond">
    <div th:replace="~{_common/messages::messages}"></div>
    <div th:replace="~{_common/messages::errors}"></div>
</div>
<section class="search-wrapper">
    <form th:action="@{/book/search}" method="post">
        <div class="search-form">
            <div class="search-field">
                <label for="schTitle">タイトル・部分一致</label>
                <input type="text" id="schTitle" name="schTitle" th:value="${searchForm?.schTitle}" maxlength="100">
            </div>

            <div class="search-field">
                <label for="schAuthor">著者・部分一致</label>
                <input type="text" id="schAuthor" name="schAuthor" th:value="${searchForm?.schAuthor}" maxlength="60">
            </div>

            <div class="search-field">
                <label for="schPublisher">出版社・部分一致</label>
                <input type="text" id="schPublisher" name="schPublisher" th:value="${searchForm?.schPublisher}" maxlength="60">
            </div>
            
            <div class="search-field">
                <label for="schCategory">カテゴリ・完全一致</label>
                <select id="schCategory" name="schCategory">
                    <option value="">すべて</option>
                    <th:block th:each="category : ${categories}">
                        <option th:value="${category.id}" th:selected="${searchForm?.schCategory == category.id}">[[${category.name}]]</option>
                    </th:block>
                </select>
            </div>
        </div>
        <div class="search-action">
            <button type="button" id="search-btn" class="search-btn">検索</button>
        </div>
    </form>
</section>

<main th:unless="${#lists.isEmpty(books)}" class="container">
    <div th:replace="~{_common/pager::pager}"></div>
    <div class="book-grid">
        <div th:each="book : ${books}" class="book-card">
            <div class="book-image">
                <img
                    th:src="${book.picFileName != null and book.picFileName != '' ? @booksImageConfigImpl.getImgUrl(book.picFileName) : @booksImageConfigImpl.getImgUrl('no_image.jpg')}"
                    alt="書籍画像"
                />
            </div>
            <div class="book-info">
                <h2 class="book-title">[[${book.title}]]</h2>
                <p th:if="${book.subTitle}" class="text-wrap">[[${book.subTitle}]]</p>
                <span class="book-author">
                    <th:block th:if="${book.author2}">
                        [[${book.author1}]] / [[${book.author2}]] 著
                    </th:block>
                    <th:block th:unless="${book.author2}">
                        [[${book.author1}]] 著
                    </th:block>
                </span>
                <div th:if="${book.translator}" class="book-translator">
                    <span>[[${book.translator}]] 訳</span>
                </div>
                <div class="book-publisher">
                    <span>[[${book.publisher}]] 出版</span>
                </div>
                <div class="book-rating">
                    <span th:each="i : ${#numbers.sequence(1, 5)}" th:classappend="${book.totalRating >= i} ? 'filled-star' : 'empty-star'">★</span>
                    <span>
                        [[${book.totalRating}]]
                    </span>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{_common/script::csrfHeader}"></div>
<!-- <div th:replace="~{_common/script::asyncDownloadCsvFile}"></div> -->
<div th:replace="~{_common/footer::footer}"></div>

<script>

    $(function() {
        $('#search-btn').click(function() {
            var $form = $(this).closest('form');
            $('#search-page').val('0');
            $form.submit();
        });
    });

</script>
</body>
</html>
