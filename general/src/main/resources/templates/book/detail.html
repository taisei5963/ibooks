<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" th:with="title='ブック詳細'">
    <head th:replace="~{_common/head::head}"></head>
    <body class="has-fixed-footer">
        <div th:replace="~{_common/header::menu}"></div>

        <div class="generalContents">
            <div class="container control-area">
                <h1>ブック詳細</h1>

                <div class="indicate-area u-mb32">
                    <div class="u-d-flex is-wrap u-gap-24 is-x-center detail-book-info">
                        <div class="u-w-full">
                            <img th:src="${book.picFileName != null and book.picFileName != '' ? @booksImageConfigImpl.getImgUrl(book.picFileName) : @booksImageConfigImpl.getImgUrl('no_image.jpg')}"
                                width="200"
                                height="250"
                                class="book-cover-shadow"
                                alt="書籍画像"/>
                        </div>
                        <div class="u-w-full">
                            <div class="book-title">
                                <h1>[[${book.title}]]</h1>
                                <p th:if="${book.subTitle}" class="subTitle">[[${book.subTitle}]]</p>
                            </div>

                            <div class="book-detail-item u-mb8">
                                <span class="item-value">
                                    <th:block th:if="${book.author2}">
                                        [[${book.author1}]] / [[${book.author2}]] 共著
                                    </th:block>
                                    <th:block th:unless="${book.author2}">
                                        [[${book.author1}]] 著
                                    </th:block>
                                </span>
                            </div>

                            <div th:if="${book.translator}" class="book-detail-item u-mb8">
                                <span class="item-value">[[${book.translator}]]</span> 訳
                            </div>

                            <div class="book-detail-item u-mb8">
                                <span class="item-value">[[${book.publisher}]]</span> 出版
                            </div>

                            <div class="book-detail-item u-mb16">
                                <div class="book-rating-stars d-inline-block">
                                    <span th:each="i : ${#numbers.sequence(1, 5)}" th:classappend="${book.totalRating >= i} ? 'filled-star' : 'empty-star'">★</span>
                                    <span class="u-ms8 book-rating-value">
                                        [[${book.totalRating}]]
                                    </span>
                                </div>
                            </div>

                            <div class="book-detail-item u-mt16">
                                <div class="px-2 book-categories-wrapper d-inline-block">
                                    <th:block th:each="id : ${ {book.categoryId1, book.categoryId2, book.categoryId3} }">
                                        <span th:if="${id != null}" th:class="|book-category-badge badge-it badge-${id}|">
                                            [[${categoryMap.get(id)}]]
                                        </span>
                                    </th:block>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="indicate-area">
                    <div th:each="review : ${reviews}" class="u-mb-4" style="border-bottom: 1px solid #ddd; padding-bottom: 1rem;">
                        <div class="book-rating-stars d-inline-block">
                            <span th:each="i : ${#numbers.sequence(1, 5)}" th:classappend="${review.rating >= i} ? 'filled-star' : 'empty-star'">★</span>
                            <span class="u-ms8 book-rating-value" th:text="${review.rating}"></span>
                        </div>
                        <div class="u-mt-1">
                            <strong th:text="${review.reviewerId}"></strong>
                            <span class="u-ms-3" th:text="${#temporals.format(review.reviewDate, 'yyyy/MM/dd')}"></span>
                        </div>
                        <p class="u-mt-2" th:text="${review.comment}"></p>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{_common/script::csrfHeader}"></div>

        <div class="fixed-bottom-button-area">
            <button type="button" th:onclick="|location.href='@{/book/search}'|" class="back-btn">戻る</button>
        </div>

        <div th:replace="~{_common/footer::footer}"></div>
    </body>
</html>
